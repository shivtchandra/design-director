<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Design Director</title>
  <desc id="desc">Agent skill for planning colors, fonts, and motion from real catalogs</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="55%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f54e00"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect x="0" y="0" width="6" height="320" fill="url(#accent)"/>
  <circle cx="1080" cy="160" r="120" fill="#f54e00" fill-opacity="0.08"/>
  <circle cx="1080" cy="160" r="72" fill="none" stroke="#f54e00" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="64" y="118" fill="#f54e00" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" letter-spacing="0.28em">AGENT SKILL</text>
  <text x="64" y="178" fill="#f4f1ea" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">Design Director</text>
  <text x="64" y="228" fill="#a8a29a" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22">Plan palette · type · motion from real catalogs  then ship.</text>
  <rect x="64" y="260" width="220" height="2" fill="url(#accent)"/>
</svg>
